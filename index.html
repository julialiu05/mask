<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Face Masks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    /* ---- Camera ---- */
    .camera-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 840px;
      aspect-ratio: 4/3;
      border-radius: 16px;
      overflow: hidden;
      background: #f0f0f0;
    }

    video, canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 16px;
      transform: scaleX(-1);
    }

    #bgCanvas { z-index: 0; }
    #canvas { z-index: 1; }
    #drawCanvas { z-index: 2; }

    /* When bg mode is active, hide the raw video and composite onto canvas */
    body.bg-mode video { opacity: 0; }
    body.bg-mode #bgCanvas { display: block; }

    /* ---- Status overlay ---- */
    .status {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      background: rgba(255,255,255,0.85);
      padding: 4px 12px;
      border-radius: 8px;
      color: rgba(0,0,0,0.35);
      z-index: 5;
      pointer-events: none;
    }

    /* ---- Right panel ---- */
    .panel {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      border-left: 1px solid rgba(0,0,0,0.08);
      overflow-y: auto;
      gap: 20px;
      background: #fafafa;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(0,0,0,0.4);
    }

    /* ---- Round icon buttons ---- */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      color: rgba(0,0,0,0.5);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.04); color: #1a1a1a; }
    .icon-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    .small-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.1);
      background: #fff;
      color: rgba(0,0,0,0.45);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .small-btn:hover { background: rgba(0,0,0,0.04); color: #1a1a1a; }
    .small-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

    /* ---- Color swatches ---- */
    .color-swatch {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #1a1a1a; transform: scale(1.15); }

    /* ---- Slider ---- */
    .size-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      outline: none;
    }
    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
    }

    /* ---- AI section ---- */
    .ai-prompt-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ai-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 20px;
      background: #fff;
      color: #1a1a1a;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .ai-input:focus { border-color: rgba(0,0,0,0.3); }
    .ai-input::placeholder { color: rgba(0,0,0,0.3); }

    .ai-send-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .ai-send-btn:hover { background: #333; }
    .ai-send-btn:disabled { cursor: not-allowed; }
    .ai-send-btn.loading { background: #1a1a1a; }
    .ai-send-btn.loading svg { display: none; }
    .ai-send-btn .dots { display: none; }
    .ai-send-btn.loading .dots { display: flex; gap: 3px; align-items: center; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .dots span {
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: bounce 1s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }

    .model-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      background: #fff;
      color: rgba(0,0,0,0.7);
      font-size: 12px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
    }
    .model-select option { background: #fff; color: #1a1a1a; }

    .style-tag {
      padding: 4px 10px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 20px;
      background: none;
      color: rgba(0,0,0,0.45);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .style-tag:hover { border-color: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }
    .style-tag.active { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,0.05); }

    /* ---- AI mask gallery ---- */
    .ai-masks {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .ai-mask-thumb {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      cursor: pointer;
      transition: all 0.2s;
      object-fit: contain;
      background: rgba(0,0,0,0.02);
      padding: 3px;
    }
    .ai-mask-thumb:hover { border-color: rgba(0,0,0,0.25); }
    .ai-mask-thumb.active { border-color: #1a1a1a; }

    .empty-gallery {
      font-size: 11px;
      color: rgba(0,0,0,0.25);
      text-align: center;
      padding: 16px 0;
    }

    /* ---- Mode tabs ---- */
    .mode-tabs {
      display: flex;
      gap: 6px;
    }

    .mode-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 0;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      background: #fff;
      color: rgba(0,0,0,0.4);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-tab svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
    }
    .mode-tab:hover { color: rgba(0,0,0,0.7); border-color: rgba(0,0,0,0.2); }
    .mode-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .mode-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      min-height: 0;
    }

    .coverage-tag {
      padding: 4px 10px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 20px;
      background: none;
      color: rgba(0,0,0,0.45);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .coverage-tag:hover { border-color: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }
    .coverage-tag.active { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,0.05); }

    .type-tag {
      padding: 4px 10px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 20px;
      background: none;
      color: rgba(0,0,0,0.45);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .type-tag:hover { border-color: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }
    .type-tag.active { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,0.05); }

    .divider {
      height: 1px;
      background: rgba(0,0,0,0.07);
    }

    label { font-size: 11px; color: rgba(0,0,0,0.4); }

    /* ---- Prompt Builder ---- */
    .builder-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .builder-toggle .panel-label { cursor: pointer; }
    .builder-chevron {
      width: 12px; height: 12px;
      stroke: rgba(0,0,0,0.3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s;
    }
    .builder-toggle.open .builder-chevron { transform: rotate(180deg); }

    .builder-body {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .builder-toggle.open + .builder-body { display: flex; }

    .builder-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .builder-row-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.35);
      font-weight: 600;
    }
    .builder-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .builder-chip {
      padding: 3px 8px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      background: none;
      color: rgba(0,0,0,0.45);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .builder-chip:hover { border-color: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }
    .builder-chip.selected { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,0.05); }

    .builder-custom {
      width: 100%;
      padding: 4px 8px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      background: rgba(0,0,0,0.02);
      color: #1a1a1a;
      font-size: 10px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .builder-custom:focus { border-color: rgba(0,0,0,0.3); }
    .builder-custom::placeholder { color: rgba(0,0,0,0.25); }

    .builder-preview {
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.03);
      border: 1px dashed rgba(0,0,0,0.1);
      font-size: 10px;
      color: rgba(0,0,0,0.5);
      min-height: 20px;
      line-height: 1.4;
      word-break: break-word;
    }

    .builder-actions {
      display: flex;
      gap: 6px;
    }
    .builder-use-btn {
      flex: 1;
      padding: 6px 0;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .builder-use-btn:hover { background: #333; border-color: #333; }
    .builder-clear-btn {
      padding: 6px 12px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      background: none;
      color: rgba(0,0,0,0.4);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .builder-clear-btn:hover { border-color: rgba(0,0,0,0.25); color: rgba(0,0,0,0.7); }

    /* ---- Builder link ---- */
    .builder-link-btn {
      display: block;
      text-align: center;
      padding: 8px 0;
      border: 1px dashed rgba(0,0,0,0.15);
      border-radius: 10px;
      color: rgba(0,0,0,0.45);
      font-size: 11px;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
    }
    .builder-link-btn:hover { border-color: rgba(0,0,0,0.3); color: #1a1a1a; background: rgba(0,0,0,0.02); }

    /* ---- Prompt slot ---- */
    .prompt-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      background: rgba(0,0,0,0.02);
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
    }
    .prompt-slot:hover { border-color: rgba(0,0,0,0.2); background: rgba(0,0,0,0.04); }
    .prompt-slot:active { transform: scale(0.98); }

    .slot-icon {
      flex-shrink: 0;
      width: 20px; height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .slot-icon.spin { transform: rotate(360deg); }

    .slot-text {
      font-size: 11px;
      color: rgba(0,0,0,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .slot-use-btn {
      flex-shrink: 0;
      padding: 3px 8px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      background: #fff;
      color: rgba(0,0,0,0.5);
      font-size: 9px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .slot-use-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    /* ---- Language toggle ---- */
    .lang-toggle {
      display: flex;
      align-self: flex-end;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 20px;
      overflow: hidden;
      font-size: 10px;
      margin-bottom: -10px;
    }
    .lang-btn {
      padding: 4px 10px;
      border: none;
      background: none;
      color: rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 10px;
    }
    .lang-btn:hover { color: rgba(0,0,0,0.7); }
    .lang-btn.active { background: #1a1a1a; color: #fff; }

    /* Hide old elements */
    .toolbar, .controls, .ai-section { display: none !important; }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Camera -->
    <div class="camera-side">
      <div class="container">
        <canvas id="bgCanvas" width="640" height="480"></canvas>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
        <canvas id="drawCanvas" width="640" height="480"></canvas>
      </div>
      <div class="status" id="status" data-i18n="statusStarting">Starting camera...</div>
    </div>

    <!-- Panel -->
    <div class="panel">
      <!-- Language toggle -->
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="zh">中文</button>
      </div>

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab" id="tabDraw" title="Draw">
          <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span data-i18n="draw">Draw</span>
        </button>
        <button class="mode-tab active" id="tabAI" title="AI Generate">
          <svg viewBox="0 0 24 24"><path d="M12 2a4 4 0 014 4c0 1.95-2 3-2 8h-4c0-5-2-6.05-2-8a4 4 0 014-4zM10 22h4M10 18h4"/></svg>
          <span data-i18n="generate">Generate</span>
        </button>
      </div>

      <!-- Shared: capture + clear -->
      <div class="btn-row" style="justify-content:center;">
        <button class="icon-btn" id="captureBtn" title="Capture photo">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="4"/><path d="M23 19V8a2 2 0 00-2-2h-3.93a2 2 0 01-1.66-.9l-.82-1.2A2 2 0 0012.93 3h-1.86a2 2 0 00-1.66.9l-.82 1.2A2 2 0 016.93 6H3a2 2 0 00-2 2v11a2 2 0 002 2h18a2 2 0 002-2z"/></svg>
        </button>
        <button class="icon-btn" id="clearMaskBtn" title="Clear mask" data-mask="none">
          <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="divider"></div>

      <!-- ========== DRAW MODE ========== -->
      <div class="mode-content" id="drawMode" style="display:none;">
        <div class="panel-section">
          <div class="panel-label" data-i18n="brush">Brush</div>
          <div class="btn-row">
            <button class="small-btn active" data-tool="brush" title="Brush">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button class="small-btn" data-tool="eraser" title="Eraser">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M20 20H7L3 16a1 1 0 010-1.4l9.6-9.6a1 1 0 011.4 0l6.6 6.6a1 1 0 010 1.4L14 20"/></svg>
            </button>
            <button class="small-btn" data-tool="spray" title="Spray">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><circle cx="12" cy="12" r="1"/><circle cx="8" cy="8" r="0.5"/><circle cx="16" cy="8" r="0.5"/><circle cx="8" cy="16" r="0.5"/><circle cx="16" cy="16" r="0.5"/><circle cx="12" cy="6" r="0.5"/><circle cx="6" cy="12" r="0.5"/><circle cx="18" cy="12" r="0.5"/><circle cx="12" cy="18" r="0.5"/></svg>
            </button>
            <button class="small-btn" id="undoBtn" title="Undo">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M3 7v6h6M3 13a9 9 0 0115.4-5.4"/></svg>
            </button>
            <button class="small-btn" id="clearBtn" title="Clear drawing">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-label" data-i18n="color">Color</div>
          <div class="btn-row" style="gap:5px;">
            <div class="color-swatch active" data-color="#ffffff" style="background:#ffffff; border-color:#ddd;"></div>
            <div class="color-swatch" data-color="#ff3366" style="background:#ff3366"></div>
            <div class="color-swatch" data-color="#ff6600" style="background:#ff6600"></div>
            <div class="color-swatch" data-color="#ffcc00" style="background:#ffcc00"></div>
            <div class="color-swatch" data-color="#33ff66" style="background:#33ff66"></div>
            <div class="color-swatch" data-color="#00ccff" style="background:#00ccff"></div>
            <div class="color-swatch" data-color="#7733ff" style="background:#7733ff"></div>
            <div class="color-swatch" data-color="#ff33cc" style="background:#ff33cc"></div>
            <div class="color-swatch" data-color="#000000" style="background:#000000"></div>
            <input type="color" id="customColor" value="#ffffff" style="width:24px;height:24px;border:none;border-radius:50%;cursor:pointer;background:none;">
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-label" data-i18n="size">Size</div>
          <input type="range" class="size-slider" id="brushSize" min="2" max="40" value="8">
        </div>
      </div>

      <!-- ========== AI MODE ========== -->
      <div class="mode-content" id="aiMode">
        <div class="panel-section">
          <div class="panel-label" data-i18n="model">Model</div>
          <select id="aiModel" class="model-select">
            <option value="openai" selected>DALL-E 3 (OpenAI)</option>
            <option value="claude">Claude (SVG)</option>
            <option value="fal">Flux Schnell (FAL)</option>
          </select>
        </div>

        <div class="panel-section">
          <div class="panel-label" data-i18n="type">Type</div>
          <div class="btn-row" style="gap:5px;">

    // ==================== PROMPT SLOT MACHINE ====================
    let lastSlotIndex = -1;
    const slotText = document.getElementById('slotText');
    const slotIcon = document.querySelector('.slot-icon');
    const promptSlot = document.getElementById('promptSlot');
    const slotUseBtn = document.getElementById('slotUseBtn');

    function rollSlot() {
      const pool = generationType === 'background' ? bgExamples : promptExamples;
      const examples = pool[currentLang];
      let idx;
      do { idx = Math.floor(Math.random() * examples.length); } while (idx === lastSlotIndex && examples.length > 1);
      lastSlotIndex = idx;

      // Spin animation
      slotIcon.classList.remove('spin');
      void slotIcon.offsetWidth; // reflow
      slotIcon.classList.add('spin');

      // Quick shuffle effect
      let ticks = 0;
      const totalTicks = 6;
      const interval = setInterval(() => {
        const rIdx = Math.floor(Math.random() * examples.length);
        slotText.textContent = examples[rIdx];
        ticks++;
        if (ticks >= totalTicks) {
          clearInterval(interval);
          slotText.textContent = examples[idx];
        }
      }, 60);
    }

    promptSlot.addEventListener('click', (e) => {
      if (e.target === slotUseBtn || slotUseBtn.contains(e.target)) return;
      rollSlot();
    });

    slotUseBtn.addEventListener('click', () => {

    // Keys: local override → localStorage fallback → prompt
    function getKey(name, hardcoded) {
      if (hardcoded) return hardcoded;
      const k = localStorage.getItem(`mask_key_${name}`);
      if (k) return k;
      const val = window.prompt(`Enter your ${name} API key.\nSaved in your browser only.`);
      if (val && val.trim()) { localStorage.setItem(`mask_key_${name}`, val.trim()); return val.trim(); }
      return null;
    }
    const _cfg = typeof MASK_CONFIG !== 'undefined' ? MASK_CONFIG : {};
    function ANTHROPIC_KEY() { return getKey('Anthropic', _cfg.ANTHROPIC_KEY); }
    function FAL_KEY() { return getKey('FAL', _cfg.FAL_KEY); }
    function OPENAI_KEY() { return getKey('OpenAI', _cfg.OPENAI_KEY); }

    let aiMaskImage = null;
    let aiGeneratedMasks = [];
    let aiMaskOffsetU = 0;
    let aiMaskOffsetV = 0;
    let aiMaskScale = 1;

    async function generateAIMask(prompt) {
      const model = document.getElementById('aiModel').value;
      if (model === 'openai') return generateOpenAIMask(prompt);
      if (model === 'claude') return generateClaudeMask(prompt);
      if (model === 'fal') return generateFalMask(prompt);
    }

    // -------------------- OpenAI (DALL-E) --------------------
    async function generateOpenAIMask(prompt) {
      const btn = document.getElementById('aiGenerate');
      const key = OPENAI_KEY();
      if (!key) { statusEl.textContent = 'No OpenAI API key provided.'; return; }
      btn.disabled = true;
      btn.classList.add('loading');
      statusEl.textContent = t('statusDalle');

      let maskPrompt;
      if (generationType === 'background') {
        maskPrompt = `A beautiful immersive background scene: ${prompt}. This is a virtual background for a video call / AR camera. Wide angle, no people, no text, no watermarks. Vivid colors, high detail, atmospheric, cinematic. Aspect ratio 4:3.`;
      } else {
        const coverageHint = selectedCoverage === 'full face' ? 'covering the full face area' : `focused on the ${selectedCoverage} area`;
        maskPrompt = `A face mask/face paint design viewed from directly in front on a pure solid black (#000000) background. The design is: ${prompt}. This is an AR face overlay filter, ${coverageHint}. Show ONLY the decorative mask elements (paint, patterns, accessories, markings). Do NOT show any human face, skin, head shape, or neck. Position mask elements where they would sit on a face (eyes at center, nose below, forehead above). Must be symmetric and centered. Think high-end Instagram/Snapchat face filter design asset. No text, no watermarks, no borders. Vivid colors, high detail, crisp edges.`;
      }

      try {
        const response = await fetch('https://api.openai.com/v1/images/generations', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`
          },
          body: JSON.stringify({
            model: 'dall-e-3',
            prompt: maskPrompt,
            n: 1,
            size: '1024x1024',
            response_format: 'b64_json'
          })
        });

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error.message);
        }

        const b64 = data.data[0].b64_json;
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = `data:image/png;base64,${b64}`;
        });

        if (generationType === 'background') {
          applyAIBackground(img, prompt);
        } else {
          // Remove dark background
          const processed = removeBackground(img);
          await new Promise((resolve) => {
            if (processed.complete) resolve();
            else processed.onload = resolve;
          });
          applyAIMask(processed, prompt);
        }
      } catch (err) {
        console.error('OpenAI mask error:', err);
        statusEl.textContent = t('statusFailed', err.message || t('statusFailedGeneric'));
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    // -------------------- Claude (SVG) --------------------
    async function generateClaudeMask(prompt) {
      const btn = document.getElementById('aiGenerate');
      const key = ANTHROPIC_KEY();
      if (!key) { statusEl.textContent = 'No Anthropic API key provided.'; return; }
      btn.disabled = true;
      btn.classList.add('loading');
      statusEl.textContent = t('statusClaude');

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4096,
            system: generationType === 'background'
              ? `You are an SVG background scene designer for an AR camera app. Generate SVG code for virtual backgrounds.

RULES:
- Output ONLY the SVG code, nothing else. No markdown, no explanation.
- The SVG viewBox should be "0 0 640 480" (landscape 4:3).
- Fill the entire canvas with the scene. Use a background rect.
- Make designs colorful, detailed, atmospheric, and immersive.
- You can use gradients, filters (blur, glow), patterns, and complex paths.
- Make it look GOOD - this is art for a virtual background.
- No text, no people, no watermarks.`
              : `You are an SVG mask designer for an AR face filter app. Generate SVG code for face masks/overlays.

RULES:
- Output ONLY the SVG code, nothing else. No markdown, no explanation.
- The SVG viewBox should be "0 0 400 500" (face-shaped canvas).
- The face center is at (200, 250). Eyes are around y=200, nose at y=280, mouth at y=340, forehead at y=120, chin at y=430.
- Left eye center: (140, 200), Right eye center: (260, 200)
- Use transparent background (no background rect).
- Make designs colorful, detailed, and visually striking.
- Use the face coordinate system - design elements relative to facial features.
- Keep it as a flat overlay mask that maps onto a face.

- Make it look GOOD - this is art, not a wireframe.`,
            messages: [{ role: 'user', content: generationType === 'background'
              ? `Create an SVG virtual background scene for: ${prompt}`

        });

        const data = await response.json();
        let svgText = data.content[0].text.trim();
        svgText = svgText.replace(/^```(?:svg|xml)?\n?/i, '').replace(/\n?```$/i, '').trim();
        if (!svgText.startsWith('<svg')) {
          const svgStart = svgText.indexOf('<svg');
          if (svgStart >= 0) svgText = svgText.substring(svgStart);
        }

        const blob = new Blob([svgText], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = url; });

        if (generationType === 'background') {

    // -------------------- FAL (Flux) --------------------
    async function generateFalMask(prompt) {
      const btn = document.getElementById('aiGenerate');
      const key = FAL_KEY();
      if (!key) { statusEl.textContent = 'No FAL API key provided.'; return; }
      btn.disabled = true;
      btn.classList.add('loading');
      statusEl.textContent = t('statusFlux');

      const maskPrompt = generationType === 'background'
        ? `${prompt}, immersive background scene, virtual background, no people, no text, cinematic, detailed, 4:3 aspect ratio`
        : `${prompt}, face mask overlay, transparent background, PNG, centered on face, no background, isolated on black background, high detail, front facing`;

      try {
        // Submit request
        const submitRes = await fetch('https://queue.fal.run/fal-ai/flux/schnell', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Key ${key}`
          },
          body: JSON.stringify({
            prompt: maskPrompt,
            image_size: { width: 512, height: 512 },
            num_images: 1,
            enable_safety_checker: false
          })
        });

        const submitData = await submitRes.json();

        // Check if we got a direct response or need to poll
        let imageUrl;
        if (submitData.images && submitData.images.length > 0) {
          imageUrl = submitData.images[0].url;
        } else if (submitData.request_id) {
          // Poll for result
          const reqId = submitData.request_id;
          let result = null;
          for (let i = 0; i < 60; i++) {
            await new Promise(r => setTimeout(r, 1000));
            const statusRes = await fetch(`https://queue.fal.run/fal-ai/flux/schnell/requests/${reqId}/status`, {
              headers: { 'Authorization': `Key ${key}` }
            });
            const statusData = await statusRes.json();
            if (statusData.status === 'COMPLETED') {
              const resultRes = await fetch(`https://queue.fal.run/fal-ai/flux/schnell/requests/${reqId}`, {
                headers: { 'Authorization': `Key ${key}` }
              });
              result = await resultRes.json();
              break;
            } else if (statusData.status === 'FAILED') {
              throw new Error('FAL generation failed');
            }
            statusEl.textContent = t('statusGenerating', i + 1);
          }
          if (!result) throw new Error('Timed out waiting for FAL');
          imageUrl = result.images[0].url;
        }

        // Load the image - use it with background removal via canvas
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = imageUrl; });

        if (generationType === 'background') {
          applyAIBackground(img, prompt);
        } else {
          const processed = removeBackground(img);
          applyAIMask(processed, prompt);
        }
      } catch (err) {
        console.error('FAL mask error:', err);
        statusEl.textContent = t('statusFailedGeneric');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    // Simple background removal: make dark pixels transparent
    function removeBackground(img) {
      const c = document.createElement('canvas');
      c.width = img.width;
      c.height = img.height;
      const cx = c.getContext('2d');
      cx.drawImage(img, 0, 0);
      const imageData = cx.getImageData(0, 0, c.width, c.height);
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const brightness = (d[i] + d[i + 1] + d[i + 2]) / 3;
        if (brightness < 30) {
          d[i + 3] = 0; // fully transparent
        } else if (brightness < 60) {
          d[i + 3] = Math.floor((brightness - 30) / 30 * 255); // fade
        }
      }
      cx.putImageData(imageData, 0, 0);
      const result = new Image();
      result.src = c.toDataURL();
      return result;
    }

    // -------------------- Shared --------------------
    let aiBgImage = null; // current background image

    function applyAIMask(img, prompt) {
      const maskData = { image: img, prompt, type: 'mask' };
      aiGeneratedMasks.push(maskData);
      aiMaskImage = img;
      aiBgImage = null;
      document.body.classList.remove('bg-mode');
      document.querySelectorAll('.mask-btn').forEach(b => b.classList.remove('active'));
      currentMask = 'ai';
      aiMaskOffsetU = 0;
      aiMaskOffsetV = 0;
      aiMaskScale = 1;
      updateCanvasInteraction();
      addMaskThumbnail(maskData);
      statusEl.textContent = t('statusReady', prompt);
    }

    function applyAIBackground(img, prompt) {
      const maskData = { image: img, prompt, type: 'background' };
      aiGeneratedMasks.push(maskData);
      aiBgImage = img;
      aiMaskImage = null;
      document.body.classList.add('bg-mode');
      document.querySelectorAll('.mask-btn').forEach(b => b.classList.remove('active'));
      currentMask = 'bg';
      updateCanvasInteraction();
      addMaskThumbnail(maskData);
      statusEl.textContent = t('statusReady', prompt);
    }

    function addMaskThumbnail(maskData) {
      const container = document.getElementById('aiMasks');

      const empty = container.querySelector('.empty-gallery');

    }

    // AI prompt handlers
    document.getElementById('aiGenerate').addEventListener('click', () => {

    });

    // Style tags (multiple select)
    let selectedStyles = [];
    document.querySelectorAll('.style-tag').forEach(tag => {

    let selectedCoverage = 'full face';
    document.querySelectorAll('.coverage-tag').forEach(tag => {

    function buildPrompt(text) {
      let parts = [text];
      if (selectedStyles.length > 0) parts.push(selectedStyles.join(', ') + ' style');
      if (generationType === 'mask') {
        if (selectedCoverage && selectedCoverage !== 'full face') parts.push(selectedCoverage);

    // ==================== AI MASK DRAG & RESIZE ====================

    drawCanvas.addEventListener('mousedown', (e) => {
      if (drawMode || currentMask !== 'ai' || !landmarks) return;
      isDraggingMask = true;
      const rect = drawCanvas.getBoundingClientRect();
      dragStartX = (e.clientX - rect.left) * (640 / rect.width);
      dragStartY = (e.clientY - rect.top) * (480 / rect.height);
      dragStartOffsetU = aiMaskOffsetU;
      dragStartOffsetV = aiMaskOffsetV;
      drawCanvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDraggingMask) return;
      const rect = drawCanvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (640 / rect.width);
      const my = (e.clientY - rect.top) * (480 / rect.height);
      const ft = getFaceTransform();
      if (!ft) return;
      // Convert pixel delta to face-relative UV delta (flip X for mirror)
      aiMaskOffsetU = dragStartOffsetU - (mx - dragStartX) / ft.faceWidth;
      aiMaskOffsetV = dragStartOffsetV + (my - dragStartY) / ft.faceHeight;
    });

    window.addEventListener('mouseup', () => {
      if (isDraggingMask) {
        isDraggingMask = false;
        drawCanvas.style.cursor = currentMask === 'ai' && !drawMode ? 'grab' : 'default';
      }
    });

    drawCanvas.addEventListener('wheel', (e) => {
      if (drawMode || currentMask !== 'ai') return;
      e.preventDefault();
      aiMaskScale = Math.max(0.2, Math.min(3, aiMaskScale - e.deltaY * 0.002));
    }, { passive: false });

    // ==================== DRAWING STATE ====================
    let drawMode = false;
    let isDrawing = false;
    let drawColor = '#ffffff';
    let brushSize = 8;
    let drawTool = 'brush';
    let lastDrawPos = null;

    // Store strokes in face-relative coordinates (UV-mapped to face)
    // Each stroke = array of { u, v, color, size, tool } where u,v are relative to face bounding box
    let strokes = [];
    let currentStroke = [];
    let strokeHistory = []; // for undo

    // Reference face transform when drawing started
    let refFaceTransform = null;

    function getFaceTransform() {
      if (!landmarks) return null;
      const nose = landmarks[1];
      const forehead = landmarks[10];
      const chin = landmarks[152];
      const leftCheek = landmarks[234];
      const rightCheek = landmarks[454];
      const leftEye = landmarks[33];
      const rightEye = landmarks[263];

      const cx = nose.x * 640;
      const cy = nose.y * 480;
      const faceWidth = Math.sqrt((rightCheek.x - leftCheek.x) ** 2 + (rightCheek.y - leftCheek.y) ** 2) * 640;
      const faceHeight = Math.sqrt((chin.x - forehead.x) ** 2 + (chin.y - forehead.y) ** 2) * 480;
      const angle = Math.atan2((rightEye.y - leftEye.y) * 480, (rightEye.x - leftEye.x) * 640);

      return { cx, cy, faceWidth, faceHeight, angle };
    }

    // Convert canvas pixel to face-relative UV
    function canvasToFaceUV(px, py) {
      const ft = getFaceTransform();
      if (!ft) return null;
      // Undo rotation around face center, then normalize
      const dx = px - ft.cx;
      const dy = py - ft.cy;
      const cosA = Math.cos(-ft.angle);
      const sinA = Math.sin(-ft.angle);
      const rx = dx * cosA - dy * sinA;
      const ry = dx * sinA + dy * cosA;
      return { u: rx / ft.faceWidth, v: ry / ft.faceHeight };
    }

    // Convert face UV back to canvas pixel using current face position
    function faceUVToCanvas(u, v) {
      const ft = getFaceTransform();
      if (!ft) return null;
      const rx = u * ft.faceWidth;
      const ry = v * ft.faceHeight;
      const cosA = Math.cos(ft.angle);
      const sinA = Math.sin(ft.angle);
      const px = rx * cosA - ry * sinA + ft.cx;
      const py = rx * sinA + ry * cosA + ft.cy;
      return { x: px, y: py };
    }

    // ==================== DRAW TOOLBAR ====================

    function updateCanvasInteraction() {
      if (drawMode) {
        drawCanvas.style.pointerEvents = 'auto';
        drawCanvas.style.cursor = 'crosshair';
      } else if (currentMask === 'ai') {
        drawCanvas.style.pointerEvents = 'auto';
        drawCanvas.style.cursor = 'grab';
      } else {
        drawCanvas.style.pointerEvents = 'none';
        drawCanvas.style.cursor = 'default';
      }
    }

    // Mode tabs
    document.getElementById('tabDraw').addEventListener('click', () => {
      document.getElementById('tabDraw').classList.add('active');
      document.getElementById('tabAI').classList.remove('active');
      document.getElementById('drawMode').style.display = 'flex';
      document.getElementById('aiMode').style.display = 'none';
      drawMode = true;
      updateCanvasInteraction();
    });

    document.getElementById('tabAI').addEventListener('click', () => {
      document.getElementById('tabAI').classList.add('active');
      document.getElementById('tabDraw').classList.remove('active');
      document.getElementById('aiMode').style.display = 'flex';
      document.getElementById('drawMode').style.display = 'none';
      drawMode = false;
      updateCanvasInteraction();
    });

    // Clear mask button
    document.getElementById('clearMaskBtn').addEventListener('click', () => {
      document.querySelectorAll('.ai-mask-thumb').forEach(t => t.classList.remove('active'));
      currentMask = 'none';
      aiMaskImage = null;
      updateCanvasInteraction();
    });

    document.querySelectorAll('.color-swatch').forEach(s => {
      s.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        drawColor = s.dataset.color;
        updateBrushPreview();
      });
    });

    document.getElementById('customColor').addEventListener('input', (e) => {
      drawColor = e.target.value;
      document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      updateBrushPreview();
    });

    document.getElementById('brushSize').addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value);
      updateBrushPreview();
    });

    function updateBrushPreview() {}

    document.querySelectorAll('.small-btn[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.small-btn[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        drawTool = btn.dataset.tool;
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      strokeHistory.push([...strokes]);
      strokes = [];
    });

    document.getElementById('undoBtn').addEventListener('click', () => {
      if (strokes.length > 0) {
        strokeHistory.push([...strokes]);
        strokes.pop();
      } else if (strokeHistory.length > 0) {
        strokes = strokeHistory.pop();
      }
    });

    updateBrushPreview();

    // ==================== DRAWING EVENTS ====================

    function getCanvasPos(e, rect) {
      // Flip X to account for CSS scaleX(-1) mirror
      const px = 640 - (e.clientX - rect.left) * (640 / rect.width);
      const py = (e.clientY - rect.top) * (480 / rect.height);
      return { px, py };
    }

    drawCanvas.addEventListener('mousedown', (e) => {
      if (!drawMode || !landmarks) return;
      isDrawing = true;
      currentStroke = [];
      const { px, py } = getCanvasPos(e, drawCanvas.getBoundingClientRect());
      addStrokePoint(px, py);
    });

    drawCanvas.addEventListener('mousemove', (e) => {
      if (!isDrawing || !drawMode || !landmarks) return;
      const { px, py } = getCanvasPos(e, drawCanvas.getBoundingClientRect());
      addStrokePoint(px, py);
    });

    drawCanvas.addEventListener('mouseup', finishStroke);
    drawCanvas.addEventListener('mouseleave', finishStroke);

    // Touch support
    drawCanvas.addEventListener('touchstart', (e) => {
      if (!drawMode || !landmarks) return;
      e.preventDefault();
      isDrawing = true;
      currentStroke = [];
      const rect = drawCanvas.getBoundingClientRect();
      const touch = e.touches[0];
      const px = 640 - (touch.clientX - rect.left) * (640 / rect.width);
      const py = (touch.clientY - rect.top) * (480 / rect.height);
      addStrokePoint(px, py);
    }, { passive: false });

    drawCanvas.addEventListener('touchmove', (e) => {
      if (!isDrawing || !drawMode || !landmarks) return;
      e.preventDefault();
      const rect = drawCanvas.getBoundingClientRect();
      const touch = e.touches[0];
      const px = 640 - (touch.clientX - rect.left) * (640 / rect.width);
      const py = (touch.clientY - rect.top) * (480 / rect.height);
      addStrokePoint(px, py);
    }, { passive: false });

    drawCanvas.addEventListener('touchend', finishStroke);

    function addStrokePoint(px, py) {
      const uv = canvasToFaceUV(px, py);
      if (!uv) return;
      currentStroke.push({
        u: uv.u, v: uv.v,
        color: drawColor,
        size: brushSize,
        tool: drawTool
      });
    }

    function finishStroke() {
      if (currentStroke.length > 0) {
        strokes.push([...currentStroke]);
      }
      currentStroke = [];
      isDrawing = false;
    }

    // ==================== RENDER STROKES ON FACE ====================

    function renderStrokes(c) {
      if (!landmarks) return;

      const allStrokes = [...strokes];
      if (currentStroke.length > 0) allStrokes.push(currentStroke);

      for (const stroke of allStrokes) {
        if (stroke.length === 0) continue;
        const firstPt = stroke[0];

        if (firstPt.tool === 'eraser') {
          c.globalCompositeOperation = 'destination-out';
        } else {
          c.globalCompositeOperation = 'source-over';
        }

        if (firstPt.tool === 'spray') {
          // Spray paint: scatter dots
          for (const pt of stroke) {
            const pos = faceUVToCanvas(pt.u, pt.v);
            if (!pos) continue;
            const ft = getFaceTransform();
            const scaledSize = pt.size * (ft.faceWidth / 200);
            for (let i = 0; i < 12; i++) {
              const angle = Math.random() * Math.PI * 2;
              const radius = Math.random() * scaledSize * 1.5;
              const sx = pos.x + Math.cos(angle) * radius;
              const sy = pos.y + Math.sin(angle) * radius;
              c.fillStyle = pt.tool === 'eraser' ? '#000' : pt.color;
              c.globalAlpha = 0.3 + Math.random() * 0.4;
              c.beginPath();
              c.arc(sx, sy, scaledSize * 0.1 + Math.random() * scaledSize * 0.15, 0, Math.PI * 2);
              c.fill();
            }
          }
          c.globalAlpha = 1;
        } else {
          // Brush or eraser: smooth line
          if (stroke.length === 1) {
            const pt = stroke[0];
            const pos = faceUVToCanvas(pt.u, pt.v);
            if (!pos) continue;
            const ft = getFaceTransform();
            const scaledSize = pt.size * (ft.faceWidth / 200);
            c.fillStyle = pt.color;
            c.beginPath();
            c.arc(pos.x, pos.y, scaledSize / 2, 0, Math.PI * 2);
            c.fill();
          } else {
            c.strokeStyle = firstPt.color;
            c.lineCap = 'round';
            c.lineJoin = 'round';

            const ft = getFaceTransform();
            const scaledSize = firstPt.size * (ft.faceWidth / 200);
            c.lineWidth = scaledSize;

            c.beginPath();
            for (let i = 0; i < stroke.length; i++) {
              const pos = faceUVToCanvas(stroke[i].u, stroke[i].v);
              if (!pos) continue;
              if (i === 0) c.moveTo(pos.x, pos.y);
              else c.lineTo(pos.x, pos.y);
            }
            c.stroke();
          }
        }
      }

      c.globalCompositeOperation = 'source-over';
      c.globalAlpha = 1;
    }

    // ==================== MASK BUTTON HANDLERS ====================

    document.querySelectorAll('.mask-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mask-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.ai-mask-thumb').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentMask = btn.dataset.mask;
        updateCanvasInteraction();
      });
    });

    // ==================== CAPTURE ====================

    document.getElementById('captureBtn').addEventListener('click', () => {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = 640;
      tempCanvas.height = 480;
      const tempCtx = tempCanvas.getContext('2d');
      if (currentMask === 'bg' && aiBgImage && segMask) {
        // Composite: bg + person cutout
        tempCtx.drawImage(aiBgImage, 0, 0, 640, 480);
        // Draw the person layer from the main canvas (already composited)
        tempCtx.drawImage(canvas, 0, 0);
        renderStrokes(tempCtx);
      } else {
        tempCtx.translate(640, 0);
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(video, 0, 0, 640, 480);
        tempCtx.setTransform(1, 0, 0, 1, 0, 0);
        if (landmarks) {
          drawMask(tempCtx);
          renderStrokes(tempCtx);
        }
      }
      const link = document.createElement('a');
      link.download = `mask-capture-${Date.now()}.png`;
      link.href = tempCanvas.toDataURL();
      link.click();
    });

    // ==================== HELPERS ====================

    function lm(index) {
      const l = landmarks[index];
      return { x: l.x * 640, y: l.y * 480, z: l.z };
    }

    function dist(a, b) {
      const pa = lm(a), pb = lm(b);
      return Math.sqrt((pa.x - pb.x) ** 2 + (pa.y - pb.y) ** 2);
    }

    function mid(a, b) {
      const pa = lm(a), pb = lm(b);
      return { x: (pa.x + pb.x) / 2, y: (pa.y + pb.y) / 2 };
    }

    // ==================== MASK RENDERERS ====================

    function drawCyberVisor(c) {
      const leftEye = lm(33);
      const rightEye = lm(263);
      const faceWidth = dist(234, 454);
      const cx = (leftEye.x + rightEye.x) / 2;
      const cy = (leftEye.y + rightEye.y) / 2;
      const angle = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
      const visorWidth = faceWidth * 0.95;
      const visorHeight = faceWidth * 0.22;

      c.save();
      c.translate(cx, cy);
      c.rotate(angle);
      const glowGrad = c.createLinearGradient(-visorWidth / 2, 0, visorWidth / 2, 0);
      glowGrad.addColorStop(0, 'rgba(0, 200, 255, 0.0)');
      glowGrad.addColorStop(0.3, 'rgba(0, 200, 255, 0.3)');
      glowGrad.addColorStop(0.7, 'rgba(120, 0, 255, 0.3)');
      glowGrad.addColorStop(1, 'rgba(120, 0, 255, 0.0)');
      c.shadowColor = 'rgba(0, 200, 255, 0.6)';
      c.shadowBlur = 30;
      c.beginPath();
      c.moveTo(-visorWidth / 2, 0);
      c.quadraticCurveTo(-visorWidth / 2, -visorHeight / 2, -visorWidth * 0.3, -visorHeight / 2);
      c.lineTo(visorWidth * 0.3, -visorHeight / 2);
      c.quadraticCurveTo(visorWidth / 2, -visorHeight / 2, visorWidth / 2, 0);
      c.quadraticCurveTo(visorWidth / 2, visorHeight / 2, visorWidth * 0.3, visorHeight / 2);
      c.lineTo(-visorWidth * 0.3, visorHeight / 2);
      c.quadraticCurveTo(-visorWidth / 2, visorHeight / 2, -visorWidth / 2, 0);
      c.closePath();
      c.fillStyle = glowGrad;
      c.fill();
      c.strokeStyle = 'rgba(0, 220, 255, 0.8)';
      c.lineWidth = 2;
      c.stroke();
      const scanX = ((animFrame * 3) % (visorWidth + 40)) - visorWidth / 2 - 20;
      c.save(); c.clip();
      c.fillStyle = 'rgba(0, 255, 255, 0.15)';
      c.fillRect(scanX, -visorHeight, 20, visorHeight * 2);
      c.restore();
      c.restore();
    }

    function drawNeonSkull(c) {
      const faceWidth = dist(234, 454);
      c.save();
      c.strokeStyle = `hsl(${(animFrame * 2) % 360}, 100%, 60%)`;
      c.lineWidth = 2;
      c.shadowColor = c.strokeStyle;
      c.shadowBlur = 15;
      const leftEyeCenter = mid(33, 133);
      const rightEyeCenter = mid(263, 362);
      const eyeRadius = faceWidth * 0.09;
      [leftEyeCenter, rightEyeCenter].forEach(eye => {
        c.beginPath(); c.arc(eye.x, eye.y, eyeRadius, 0, Math.PI * 2); c.stroke();
        c.beginPath(); c.arc(eye.x, eye.y, eyeRadius * 0.4, 0, Math.PI * 2);
        c.fillStyle = c.strokeStyle;
        c.globalAlpha = 0.3 + 0.1 * Math.sin(animFrame * 0.1); c.fill(); c.globalAlpha = 1;
      });
      const noseTop = lm(6), noseLeft = lm(48), noseRight = lm(278);
      c.beginPath(); c.moveTo(noseTop.x, noseTop.y); c.lineTo(noseLeft.x, noseLeft.y + 5); c.lineTo(noseRight.x, noseRight.y + 5); c.closePath(); c.stroke();
      const jawIndices = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109, 10];
      c.beginPath(); jawIndices.forEach((idx, i) => { const p = lm(idx); if (i === 0) c.moveTo(p.x, p.y); else c.lineTo(p.x, p.y); }); c.stroke();
      const mouthLeft = lm(61), mouthRight = lm(291), upperLip = lm(13), lowerLip = lm(14);
      const mouthCy = (upperLip.y + lowerLip.y) / 2;
      for (let i = 0; i <= 7; i++) { const t = i / 7; const tx = mouthLeft.x + (mouthRight.x - mouthLeft.x) * t; c.beginPath(); c.moveTo(tx, upperLip.y); c.lineTo(tx, lowerLip.y); c.stroke(); }
      c.beginPath(); c.moveTo(mouthLeft.x, mouthCy); c.lineTo(mouthRight.x, mouthCy); c.stroke();
      c.restore();
    }

    function drawGlitch(c) {
      const faceWidth = dist(234, 454);
      const forehead = lm(10), chin = lm(152), leftJaw = lm(234);
      const sliceCount = 8 + Math.floor(Math.sin(animFrame * 0.05) * 3);
      const faceTop = forehead.y - 20, faceBottom = chin.y + 10, faceLeft = leftJaw.x - 10;
      const sliceHeight = (faceBottom - faceTop) / sliceCount;
      c.save();
      for (let i = 0; i < sliceCount; i++) {
        const offset = Math.sin(animFrame * 0.15 + i * 1.5) * (15 + 10 * Math.sin(animFrame * 0.08));
        const y = faceTop + i * sliceHeight;
        c.drawImage(video, faceLeft, y, faceWidth + 20, sliceHeight, faceLeft + offset, y, faceWidth + 20, sliceHeight);
        c.globalCompositeOperation = 'screen'; c.globalAlpha = 0.4;
        c.fillStyle = i % 2 === 0 ? '#ff003c' : '#00ffff';
        c.fillRect(faceLeft + offset, y, faceWidth + 20, sliceHeight);
        c.globalAlpha = 1; c.globalCompositeOperation = 'source-over';
      }
      c.fillStyle = 'rgba(0,0,0,0.08)';
      for (let y = 0; y < 480; y += 3) c.fillRect(0, y, 640, 1);
      c.restore();
    }

    function drawDiamondMesh(c) {
      c.save();
      c.strokeStyle = 'rgba(255, 215, 0, 0.6)'; c.lineWidth = 1;
      c.shadowColor = 'rgba(255, 215, 0, 0.4)'; c.shadowBlur = 8;
      const meshPoints = [10, 67, 109, 108, 151, 337, 297, 338, 21, 54, 103, 68, 71, 104, 69, 108, 151, 337, 299, 333, 298, 301, 368, 264, 447, 366, 401, 435, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 138, 213, 147, 123, 116, 143, 156, 70, 63, 105, 66, 107, 9, 336, 296, 334, 293, 283, 282, 295, 285, 8, 55, 65, 52, 53, 46, 124, 35, 111, 117, 118, 119, 120, 121, 128, 245, 193, 417, 351, 419, 248, 281, 363, 360, 279, 331, 294, 278, 344, 440, 275, 4, 45, 220, 115, 48, 64, 236];
      for (let i = 0; i < meshPoints.length - 1; i++) {
        const p1 = lm(meshPoints[i]), p2 = lm(meshPoints[i + 1]);
        c.globalAlpha = 0.3 + 0.3 * Math.sin(animFrame * 0.08 + i * 0.3);
        c.beginPath(); c.moveTo(p1.x, p1.y); c.lineTo(p2.x, p2.y); c.stroke();
      }
      const crossLinks = [[10, 151], [151, 152], [10, 9], [9, 8], [8, 152], [67, 296], [297, 54], [234, 454], [33, 263], [70, 300], [105, 334], [107, 336], [103, 337]];
      crossLinks.forEach(([a, b]) => { const p1 = lm(a), p2 = lm(b); c.globalAlpha = 0.4; c.beginPath(); c.moveTo(p1.x, p1.y); c.lineTo(p2.x, p2.y); c.stroke(); });
      c.globalAlpha = 1;
      [10, 152, 234, 454, 1, 33, 263, 151].forEach((idx, i) => {
        const p = lm(idx); const sparkle = 0.5 + 0.5 * Math.sin(animFrame * 0.12 + i);
        c.fillStyle = `rgba(255, 255, 255, ${sparkle * 0.8})`; c.beginPath(); c.arc(p.x, p.y, 2.5, 0, Math.PI * 2); c.fill();
      });
      c.restore();
    }

    function drawFlameCrown(c) {
      const forehead = lm(10);
      const faceWidth = dist(234, 454);
      c.save();
      const crownWidth = faceWidth * 1.1, crownHeight = faceWidth * 0.7;
      const cx = forehead.x, cy = forehead.y - crownHeight * 0.15;
      const crownPoints = [];
      for (let i = 0; i < 9; i++) {
        const t = i / 8; const x = cx - crownWidth / 2 + crownWidth * t;
        const flicker = Math.sin(animFrame * 0.2 + i * 1.7) * 8 + Math.sin(animFrame * 0.35 + i * 0.9) * 5;
        const heightMult = 1 - Math.abs(t - 0.5) * 1.6;
        const tipY = cy - crownHeight * heightMult * (0.6 + 0.15 * Math.sin(animFrame * 0.13 + i)) + flicker;
        crownPoints.push({ x, baseY: cy, tipY });
      }
      for (let layer = 2; layer >= 0; layer--) {
        const colors = ['rgba(255, 60, 0, 0.4)', 'rgba(255, 140, 0, 0.5)', 'rgba(255, 220, 50, 0.6)'];
        c.fillStyle = colors[layer];
        c.shadowColor = layer === 2 ? 'rgba(255, 100, 0, 0.8)' : 'transparent';
        c.shadowBlur = layer === 2 ? 25 : 0;
        const shrink = layer * 0.15;
        c.beginPath(); c.moveTo(crownPoints[0].x + crownWidth * shrink / 2, crownPoints[0].baseY);
        for (let i = 0; i < crownPoints.length - 1; i++) {
          const pt = crownPoints[i], next = crownPoints[i + 1];
          const x = pt.x * (1 - shrink) + cx * shrink;
          const nx = next.x * (1 - shrink) + cx * shrink;
          c.lineTo(x, pt.tipY + crownHeight * shrink * 0.3);
          c.quadraticCurveTo((x + nx) / 2, pt.baseY + 5, nx, next.tipY + crownHeight * shrink * 0.3);
        }
        c.lineTo(crownPoints[8].x - crownWidth * shrink / 2, crownPoints[8].baseY);
        c.closePath(); c.fill();
      }
      c.restore();
    }

    // ==================== MAIN DRAW ====================

    function drawAIMask(c) {
      if (!aiMaskImage || !landmarks) return;

      const forehead = lm(10);
      const chin = lm(152);
      const leftCheek = lm(234);
      const rightCheek = lm(454);
      const leftEye = lm(33);
      const rightEye = lm(263);

      // Use face oval landmarks for clipping
      const faceOvalIndices = [10, 338, 297, 332, 284, 251, 389, 356, 454,
        323, 361, 288, 397, 365, 379, 378, 400, 377, 152,
        148, 176, 149, 150, 136, 172, 58, 132, 93, 234,
        127, 162, 21, 54, 103, 67, 109, 10];

      const faceCx = (leftCheek.x + rightCheek.x) / 2;
      const faceCy = (forehead.y + chin.y) / 2;
      const rawFaceW = dist(234, 454);
      const rawFaceH = dist(10, 152);
      const faceWidth = rawFaceW * 1.4 * aiMaskScale;
      const faceHeight = rawFaceH * 1.25 * aiMaskScale;
      const angle = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);

      // Apply face-relative offset
      const offsetPx = faceUVToCanvas(aiMaskOffsetU, aiMaskOffsetV);
      const centerPx = faceUVToCanvas(0, 0);
      const dx = offsetPx && centerPx ? offsetPx.x - centerPx.x : 0;
      const dy = offsetPx && centerPx ? offsetPx.y - centerPx.y : 0;

      c.save();

      // Clip to face oval shape (with some padding)
      c.beginPath();
      const pad = 1.15; // slight padding beyond face edge
      faceOvalIndices.forEach((idx, i) => {
        const p = lm(idx);
        // Scale outward from face center for padding
        const px = faceCx + (p.x - faceCx) * pad;
        const py = faceCy + (p.y - faceCy) * pad;
        if (i === 0) c.moveTo(px, py);
        else c.lineTo(px, py);
      });
      c.closePath();
      c.clip();

      // Draw the mask image
      c.translate(faceCx + dx, faceCy + dy);
      c.rotate(angle);
      c.drawImage(aiMaskImage, -faceWidth / 2, -faceHeight / 2, faceWidth, faceHeight);
      c.restore();
    }

    function drawMask(c) {
      switch (currentMask) {
        case 'cyber': drawCyberVisor(c); break;
        case 'neon-skull': drawNeonSkull(c); break;
        case 'glitch': drawGlitch(c); break;
        case 'diamond': drawDiamondMesh(c); break;
        case 'flame': drawFlameCrown(c); break;
        case 'ai': drawAIMask(c); break;
        case 'bg': drawBackground(c); break;
      }
    }

    // Background compositing using selfie segmentation mask
    let segMask = null; // stores the latest segmentation mask

    function drawBackground(c) {
      if (!aiBgImage) return;

      const bgCanvas = document.getElementById('bgCanvas');
      const bgCtx = bgCanvas.getContext('2d');

      // Draw the background image (mirrored to match video)
      bgCtx.save();
      bgCtx.translate(640, 0);
      bgCtx.scale(-1, 1);
      bgCtx.drawImage(aiBgImage, 0, 0, 640, 480);
      bgCtx.restore();

      if (!segMask) return;

      // Draw the person cutout from video using segmentation mask
      // 1. Draw mirrored video onto a temp canvas
      // 2. Apply segmentation mask as alpha
      // 3. Draw result onto main canvas

      const tmpC = document.createElement('canvas');
      tmpC.width = 640; tmpC.height = 480;
      const tmpCtx = tmpC.getContext('2d');

      // Draw mirrored video
      tmpCtx.save();
      tmpCtx.translate(640, 0);
      tmpCtx.scale(-1, 1);
      tmpCtx.drawImage(video, 0, 0, 640, 480);
      tmpCtx.restore();

      // Get video pixels
      const frame = tmpCtx.getImageData(0, 0, 640, 480);
      const pixels = frame.data;

      // Get mask pixels (segMask is already an ImageData or canvas)
      const maskC = document.createElement('canvas');
      maskC.width = segMask.width; maskC.height = segMask.height;
      const maskCtx = maskC.getContext('2d');
      maskCtx.drawImage(segMask, 0, 0);
      const maskData = maskCtx.getImageData(0, 0, maskC.width, maskC.height);
      const maskPixels = maskData.data;

      // Scale factor if mask size differs from canvas
      const sx = maskC.width / 640;
      const sy = maskC.height / 480;

      // Apply mask: set alpha of video pixels based on segmentation
      for (let y = 0; y < 480; y++) {
        for (let x = 0; x < 640; x++) {
          const fi = (y * 640 + x) * 4;
          const mx = Math.floor(x * sx);
          const my = Math.floor(y * sy);
          const mi = (my * maskC.width + mx) * 4;
          // Segmentation mask: person pixels are bright (close to 255)
          const confidence = maskPixels[mi]; // red channel = person confidence
          // Smooth edge with threshold
          let alpha;
          if (confidence > 200) alpha = 255;
          else if (confidence > 100) alpha = Math.floor((confidence - 100) / 100 * 255);
          else alpha = 0;
          pixels[fi + 3] = alpha;
        }
      }

      tmpCtx.putImageData(frame, 0, 0);
      c.drawImage(tmpC, 0, 0);
    }

    // ==================== FACE MESH ====================

    let faceMesh = null;
    let selfieSegmentation = null;

    async function init() {
      statusEl.textContent = 'Loading models...';

      try {
        // Initialize FaceMesh
        faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });
        faceMesh.onResults((results) => {
          ctx.clearRect(0, 0, 640, 480);
          drawCtx.clearRect(0, 0, 640, 480);
          if (currentMask !== 'bg') {
            const bgC = document.getElementById('bgCanvas');
            bgC.getContext('2d').clearRect(0, 0, 640, 480);
          }
          animFrame++;
          if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            landmarks = results.multiFaceLandmarks[0];
            drawMask(ctx);
            renderStrokes(drawCtx);
            const mode = drawMode ? 'drawing' : (currentMask === 'none' ? 'select a mask' : currentMask);
            statusEl.textContent = t('statusTracking', mode);
          } else {
            landmarks = null;
            statusEl.textContent = t('statusNoFace');
          }
        });

        // Initialize Selfie Segmentation
        try {
          selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
          });
          selfieSegmentation.setOptions({
            modelSelection: 1,
            selfieMode: true,
          });
          selfieSegmentation.onResults((results) => {
            if (results.segmentationMask) {
              segMask = results.segmentationMask;
            }
          });
        } catch (segErr) {
          console.warn('Selfie segmentation failed to load:', segErr);
          selfieSegmentation = null;
        }

        // Start camera
        statusEl.textContent = 'Starting camera...';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        await video.play();

        const camera = new Camera(video, {
          onFrame: async () => {
            try {
              if (faceMesh) await faceMesh.send({ image: video });
            } catch (e) { console.warn('FaceMesh frame error:', e); }
            if (currentMask === 'bg' && selfieSegmentation) {
              try {
                await selfieSegmentation.send({ image: video });
              } catch (e) { console.warn('Segmentation frame error:', e); }
            }
          },
          width: 640, height: 480
        });
        camera.start();
        statusEl.textContent = t('statusCameraReady');
      } catch (err) {
        console.error('Init error:', err);
        statusEl.textContent = `Error: ${err.name || ''} ${err.message || 'Camera failed'}`;
      }
    }

    init();
  </script>
</body>
</html>
